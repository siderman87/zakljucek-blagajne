<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Digitalna dobavnica MVP</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family: Arial, sans-serif; background:#f3f4f6; color:#111827; }
    .top { background:white; padding:14px; border-bottom:1px solid #ddd; position:sticky; top:0; z-index:10; }
    .top-inner { max-width:1100px; margin:auto; display:flex; justify-content:space-between; align-items:center; gap:10px; }
    .brand { display:flex; align-items:center; gap:10px; }
    .logo { width:42px; height:42px; border-radius:14px; background:#dcfce7; display:flex; align-items:center; justify-content:center; font-size:23px; }
    h1 { margin:0; font-size:20px; }
    .sub { font-size:12px; color:#6b7280; margin-top:2px; }
    .wrap { max-width:1100px; margin:auto; padding:14px; }
    .grid { display:grid; grid-template-columns: 360px 1fr; gap:14px; }
    .card { background:white; border:1px solid #e5e7eb; border-radius:18px; padding:14px; box-shadow:0 2px 8px rgba(0,0,0,.04); }
    .login { min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; }
    .login .card { width:100%; max-width:420px; }
    input, select, textarea { width:100%; padding:12px; border:1px solid #d1d5db; border-radius:12px; font-size:16px; background:white; }
    button { border:0; border-radius:12px; padding:12px 14px; font-size:15px; font-weight:700; cursor:pointer; background:#16a34a; color:white; }
    button.secondary { background:white; color:#111827; border:1px solid #d1d5db; }
    button.danger { background:#dc2626; }
    button.small { padding:8px 10px; font-size:13px; }
    .pin { text-align:center; font-size:28px; letter-spacing:8px; }
    .list { display:flex; flex-direction:column; gap:10px; margin-top:12px; }
    .delivery { cursor:pointer; }
    .delivery.active { border:2px solid #22c55e; }
    .row { display:flex; justify-content:space-between; gap:10px; align-items:flex-start; }
    .badge { display:inline-block; padding:5px 10px; border-radius:999px; font-size:12px; font-weight:700; white-space:nowrap; }
    .gray { background:#f3f4f6; color:#374151; }
    .green { background:#dcfce7; color:#166534; }
    .blue { background:#dbeafe; color:#1d4ed8; }
    .orange { background:#ffedd5; color:#c2410c; }
    .yellowbox { background:#fef9c3; color:#854d0e; border-radius:14px; padding:10px; font-size:14px; }
    .stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .stat { border:1px solid #e5e7eb; border-radius:14px; padding:10px; }
    .stat b { display:block; font-size:22px; margin-top:4px; }
    .items { border:1px solid #e5e7eb; border-radius:14px; overflow:hidden; }
    .item, .item-head { display:grid; grid-template-columns: 1.5fr .7fr .8fr .4fr; gap:8px; align-items:center; padding:10px; border-top:1px solid #e5e7eb; }
    .item-head { background:#f9fafb; border-top:0; font-size:12px; font-weight:700; color:#4b5563; }
    .item.changed { background:#fff7ed; }
    .muted { color:#6b7280; font-size:13px; }
    .actions { display:flex; gap:8px; flex-wrap:wrap; }
    .add-grid { display:grid; grid-template-columns:1fr 100px auto; gap:8px; }
    .hidden { display:none; }
    .pdf { background:#fff; padding:18px; border:1px solid #ddd; border-radius:12px; }
    .pdf h2 { margin-top:0; }
    .pdf table { width:100%; border-collapse:collapse; margin-top:12px; }
    .pdf th, .pdf td { border:1px solid #ddd; padding:8px; text-align:left; }
    .pdf th { background:#f3f4f6; }
    @media (max-width: 850px) {
      .grid { grid-template-columns:1fr; }
      .top-inner { align-items:flex-start; }
      .item, .item-head { grid-template-columns:1.2fr .6fr .8fr .35fr; font-size:13px; }
      .add-grid { grid-template-columns:1fr; }
      h1 { font-size:18px; }
      .wrap { padding:10px; }
      .card { border-radius:16px; padding:12px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

<script>
const drivers = [
  { id: 1, name: "Marko", pin: "1111", vehicle: "Kombi 1 - LJ AB-123", role: "driver" },
  { id: 2, name: "Tadej", pin: "2222", vehicle: "Kombi 2 - LJ CD-456", role: "driver" },
  { id: 99, name: "Admin", pin: "9999", vehicle: "Pisarna", role: "admin" }
];

const catalog = [
  { code: "JAB-GALA", name: "Jabolka Gala", unit: "kg" },
  { code: "BAN", name: "Banane", unit: "kg" },
  { code: "SOL", name: "Solata", unit: "kos" },
  { code: "PAR", name: "Paradižnik", unit: "kg" },
  { code: "KROM", name: "Krompir", unit: "kg" },
  { code: "POM", name: "Pomaranče", unit: "kg" }
];

let state = {
  user: null,
  selectedId: null,
  query: "",
  deliveries: JSON.parse(localStorage.getItem("dobavniceMVP") || "null") || [
    {
      id: 1001, trisNo: "TRIS-2026-001", customer: "Gostilna Novak", address: "Medvode 12",
      email: "info@gostilna-novak.si", vehicle: "Kombi 1 - LJ AB-123", driverId: 1, status: "Čaka",
      note: "Dostava do zadnjega vhoda.", signature: "", emailSent: false,
      items: [
        { code:"JAB-GALA", name:"Jabolka Gala", originalQty:12, finalQty:12, unit:"kg", changed:false },
        { code:"BAN", name:"Banane", originalQty:8, finalQty:8, unit:"kg", changed:false },
        { code:"SOL", name:"Solata", originalQty:20, finalQty:20, unit:"kos", changed:false }
      ]
    },
    {
      id: 1002, trisNo: "TRIS-2026-002", customer: "Vrtec Sonček", address: "Ljubljana, Sončna 4",
      email: "nabava@vrtec-soncek.si", vehicle: "Kombi 1 - LJ AB-123", driverId: 1, status: "Čaka",
      note: "Pokliči 10 min prej.", signature: "", emailSent: false,
      items: [
        { code:"POM", name:"Pomaranče", originalQty:15, finalQty:15, unit:"kg", changed:false },
        { code:"PAR", name:"Paradižnik", originalQty:6, finalQty:6, unit:"kg", changed:false }
      ]
    },
    {
      id: 1003, trisNo: "TRIS-2026-003", customer: "Restavracija Center", address: "Ljubljana, Trg 1",
      email: "racuni@center.si", vehicle: "Kombi 2 - LJ CD-456", driverId: 2, status: "V teku",
      note: "", signature: "", emailSent: false,
      items: [
        { code:"KROM", name:"Krompir", originalQty:25, finalQty:25, unit:"kg", changed:false },
        { code:"BAN", name:"Banane", originalQty:5, finalQty:5, unit:"kg", changed:false }
      ]
    }
  ]
};

function save() { localStorage.setItem("dobavniceMVP", JSON.stringify(state.deliveries)); }
function esc(s) { return String(s ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
function tone(status) { return status === "Dostavljeno" ? "green" : status === "V teku" ? "blue" : status === "Spremenjeno" ? "orange" : "gray"; }

function login() {
  const pin = document.getElementById("pin").value.trim();
  const user = drivers.find(d => d.pin === pin);
  if (!user) return alert("Napačen PIN. Test: Marko 1111, Tadej 2222, Admin 9999");
  state.user = user;
  state.selectedId = null;
  render();
}

function logout() { state.user = null; state.selectedId = null; render(); }

function getVisible() {
  let list = state.user.role === "admin" ? state.deliveries : state.deliveries.filter(d => d.driverId === state.user.id);
  const q = state.query.toLowerCase();
  return list.filter(d => (d.customer + " " + d.address + " " + d.trisNo).toLowerCase().includes(q));
}

function updateDelivery(id, updater) {
  state.deliveries = state.deliveries.map(d => d.id === id ? updater(d) : d);
  save();
  render();
}

function selectDelivery(id) { state.selectedId = id; render(); }

function changeQty(code, val) {
  const selected = state.deliveries.find(d => d.id === state.selectedId);
  updateDelivery(selected.id, d => ({
    ...d,
    status: d.status === "Dostavljeno" ? d.status : "Spremenjeno",
    items: d.items.map(i => i.code === code ? { ...i, finalQty: Number(val), changed: Number(val) !== i.originalQty } : i)
  }));
}

function removeItem(code) {
  const selected = state.deliveries.find(d => d.id === state.selectedId);
  updateDelivery(selected.id, d => ({
    ...d,
    status: "Spremenjeno",
    items: d.items.map(i => i.code === code ? { ...i, finalQty: 0, changed: true } : i)
  }));
}

function addItem() {
  const selected = state.deliveries.find(d => d.id === state.selectedId);
  const code = document.getElementById("newItem").value;
  const qty = Number(document.getElementById("newQty").value || 0);
  const item = catalog.find(a => a.code === code);
  if (!qty || qty <= 0) return alert("Vpiši količino.");
  updateDelivery(selected.id, d => {
    const exists = d.items.find(i => i.code === code);
    if (exists) {
      return { ...d, status:"Spremenjeno", items: d.items.map(i => i.code === code ? { ...i, finalQty: i.finalQty + qty, changed: true } : i) };
    }
    return { ...d, status:"Spremenjeno", items:[...d.items, { ...item, originalQty:0, finalQty:qty, changed:true }] };
  });
}

function updateSignature(val) {
  const selected = state.deliveries.find(d => d.id === state.selectedId);
  updateDelivery(selected.id, d => ({ ...d, signature: val }));
}

function finishDelivery() {
  const selected = state.deliveries.find(d => d.id === state.selectedId);
  if (!selected.signature.trim()) return alert("Najprej vpiši podpis/prevzemnika.");
  updateDelivery(selected.id, d => ({ ...d, status:"Dostavljeno", emailSent:true }));
  alert("Dobavnica je zaključena. V pravi verziji se tukaj avtomatsko pošlje PDF na email stranke.");
}

function exportJson() {
  const data = JSON.stringify(state.deliveries, null, 2);
  const blob = new Blob([data], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "digitalne-dobavnice-export.json"; a.click();
  URL.revokeObjectURL(url);
}

function resetData() {
  if (!confirm("Resetiram testne dobavnice?")) return;
  localStorage.removeItem("dobavniceMVP");
  location.reload();
}

function showPdf() {
  const d = state.deliveries.find(x => x.id === state.selectedId);
  const rows = d.items.map(i => `<tr><td>${esc(i.name)}</td><td>${esc(i.finalQty)} ${esc(i.unit)}</td><td>${i.changed ? "DA" : ""}</td></tr>`).join("");
  const w = window.open("", "_blank");
  w.document.write(`
    <html><head><title>Dobavnica ${esc(d.trisNo)}</title><style>body{font-family:Arial;padding:20px}table{width:100%;border-collapse:collapse}td,th{border:1px solid #ddd;padding:8px}th{background:#eee}</style></head>
    <body>
      <h2>DOBAVNICA ${esc(d.trisNo)}</h2>
      <p><b>Stranka:</b> ${esc(d.customer)}<br><b>Naslov:</b> ${esc(d.address)}<br><b>Email:</b> ${esc(d.email)}</p>
      <table><tr><th>Artikel</th><th>Količina</th><th>Spremenjeno</th></tr>${rows}</table>
      <p><b>Prevzel/podpis:</b> ${esc(d.signature || "-")}</p>
      <button onclick="window.print()">Natisni / shrani PDF</button>
    </body></html>
  `);
  w.document.close();
}

function renderLogin() {
  return `
    <div class="login">
      <div class="card">
        <div class="brand">
          <div class="logo">🚚</div>
          <div>
            <h1>Digitalna dobavnica</h1>
            <div class="sub">MVP za šoferje in pisarno</div>
          </div>
        </div>
        <br>
        <input id="pin" class="pin" placeholder="PIN" inputmode="numeric" onkeydown="if(event.key==='Enter')login()">
        <br><br>
        <button style="width:100%" onclick="login()">Prijava</button>
        <p class="muted">Testni PIN-i: Marko 1111, Tadej 2222, Admin 9999</p>
      </div>
    </div>`;
}

function renderApp() {
  const visible = getVisible();
  const selected = state.deliveries.find(d => d.id === state.selectedId);
  const stats = {
    total: state.deliveries.length,
    waiting: state.deliveries.filter(d => d.status === "Čaka").length,
    active: state.deliveries.filter(d => d.status === "V teku" || d.status === "Spremenjeno").length,
    done: state.deliveries.filter(d => d.status === "Dostavljeno").length
  };

  const listHtml = visible.map(d => `
    <div class="card delivery ${state.selectedId === d.id ? "active" : ""}" onclick="selectDelivery(${d.id})">
      <div class="row">
        <div>
          <b>${esc(d.customer)}</b>
          <div class="muted">${esc(d.address)}</div>
          <div class="muted">${esc(d.trisNo)}</div>
        </div>
        <span class="badge ${tone(d.status)}">${esc(d.status)}</span>
      </div>
      <div class="row muted" style="margin-top:10px">
        <span>${d.items.length} artiklov</span>
        <span>${d.emailSent ? "Email poslan" : "Email še ni poslan"}</span>
      </div>
    </div>
  `).join("");

  let detail = `<div class="card" style="min-height:350px;display:flex;align-items:center;justify-content:center;text-align:center;color:#6b7280">Izberi dobavnico.</div>`;
  if (selected) {
    const items = selected.items.map(i => `
      <div class="item ${i.changed ? "changed" : ""}">
        <div><b>${esc(i.name)}</b><div class="muted">${esc(i.code)}</div></div>
        <div>${esc(i.originalQty)} ${esc(i.unit)}</div>
        <div><input type="number" value="${esc(i.finalQty)}" onchange="changeQty('${esc(i.code)}', this.value)"></div>
        <div><button class="small danger" onclick="removeItem('${esc(i.code)}')">×</button></div>
      </div>
    `).join("");

    const options = catalog.map(a => `<option value="${esc(a.code)}">${esc(a.name)} (${esc(a.unit)})</option>`).join("");

    detail = `
      <div class="card">
        <div class="row">
          <div>
            <h1>${esc(selected.customer)}</h1>
            <div class="muted">${esc(selected.address)}</div>
            <div class="muted">${esc(selected.trisNo)} · ${esc(selected.email)}</div>
          </div>
          <span class="badge ${tone(selected.status)}">${esc(selected.status)}</span>
        </div>
        <br>
        ${selected.note ? `<div class="yellowbox">Opomba: ${esc(selected.note)}</div><br>` : ""}
        <div class="items">
          <div class="item-head"><div>Artikel</div><div>Original</div><div>Končno</div><div></div></div>
          ${items}
        </div>
        <br>
        <div class="card" style="box-shadow:none">
          <b>+ Dodaj artikel</b><br><br>
          <div class="add-grid">
            <select id="newItem">${options}</select>
            <input id="newQty" type="number" value="1">
            <button onclick="addItem()">Dodaj</button>
          </div>
        </div>
        <br>
        <div class="card" style="box-shadow:none">
          <b>Podpis / prevzemnik</b><br><br>
          <input value="${esc(selected.signature)}" placeholder="Ime in priimek prevzemnika" oninput="updateSignature(this.value)">
        </div>
        <br>
        <div class="actions">
          <button onclick="finishDelivery()">Zaključi in označi email</button>
          <button class="secondary" onclick="showPdf()">Predogled / PDF</button>
          <button class="secondary" onclick="alert('Tu bi odprli Google Maps navigacijo.')">Navigacija</button>
        </div>
      </div>
    `;
  }

  return `
    <div class="top">
      <div class="top-inner">
        <div class="brand">
          <div class="logo">🚚</div>
          <div>
            <h1>Digitalna dobavnica MVP</h1>
            <div class="sub">${esc(state.user.name)} · ${esc(state.user.vehicle)}</div>
          </div>
        </div>
        <button class="secondary" onclick="logout()">Odjava</button>
      </div>
    </div>
    <div class="wrap">
      <div class="grid">
        <div>
          ${state.user.role === "admin" ? `
            <div class="card">
              <b>Admin pregled</b><br><br>
              <div class="stats">
                <div class="stat">Vse <b>${stats.total}</b></div>
                <div class="stat">Čaka <b>${stats.waiting}</b></div>
                <div class="stat">V teku <b>${stats.active}</b></div>
                <div class="stat">Dostavljeno <b>${stats.done}</b></div>
              </div>
              <br>
              <button class="secondary" style="width:100%" onclick="exportJson()">Izvoz JSON</button>
              <br><br>
              <button class="secondary" style="width:100%" onclick="resetData()">Reset testnih podatkov</button>
            </div><br>` : ""}
          <input placeholder="Išči stranko, naslov, TRIS..." value="${esc(state.query)}" oninput="state.query=this.value; render()">
          <div class="list">${listHtml || `<div class="card muted">Ni dobavnic.</div>`}</div>
        </div>
        <div>${detail}</div>
      </div>
    </div>`;
}

function render() {
  document.getElementById("app").innerHTML = state.user ? renderApp() : renderLogin();
}

render();
</script>
</body>
</html>
